name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please include as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python3 job_search.py run --profile profiles/myprofile.md`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs / traceback
      description: Paste any relevant error output
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: JobClaw version / commit
      description: Which version or commit are you running?
      placeholder: "e.g., latest master or commit hash"
    validations:
      required: false
